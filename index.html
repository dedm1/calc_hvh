<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f1419">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>HMA Token Calculator</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="wrap">
    <nav class="app-nav">
        <a href="index.html" class="nav-link active" data-i18n="navTokens">Токены</a>
        <a href="keys.html" class="nav-link" data-i18n="navKeys">Ключи</a>
    </nav>

    <div class="top-bar">
        <header>
            <h1 data-i18n="title">Калькулятор HMA токенов</h1>
            <p data-i18n="subtitle">Тапни токен · выбери сумму · считай</p>
        </header>
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="ru" type="button">RU</button>
            <button class="lang-btn" data-lang="en" type="button">EN</button>
        </div>
    </div>

    <div class="card">
        <p class="card-title" data-i18n="targetTitle">Целевая сумма</p>
        <div class="presets" id="presets"></div>
        <div class="target-row">
            <button class="step-btn" data-action="step-down" type="button">−</button>
            <input type="number" id="target" value="1970">
            <button class="step-btn" data-action="step-up" type="button">+</button>
        </div>
    </div>

    <div class="card">
        <p class="card-title" data-i18n="difficultyTitle">Сложность</p>
        <div class="mode-toggle difficulty-toggle">
            <button class="mode-btn" data-difficulty="normal" type="button">
                <span class="icon">🟢</span>
                <span data-i18n="difficultyNormal">Обычный</span>
            </button>
            <button class="mode-btn active" data-difficulty="hard" type="button">
                <span class="icon">🔥</span>
                <span data-i18n="difficultyHard">Хард</span>
            </button>
        </div>
    </div>

    <div class="card">
        <p class="card-title" data-i18n="modeTitle">Режим поиска</p>
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="lower" type="button">
                <span class="icon">⬇️</span>
                <span data-i18n="modeLower">Ближайшее ниже</span>
            </button>
            <button class="mode-btn" data-mode="higher" type="button">
                <span class="icon">⬆️</span>
                <span data-i18n="modeHigher">Ближайшее выше</span>
            </button>
        </div>
    </div>

    <div class="card">
        <p class="card-title" data-i18n="excludeTitle">Исключить токены</p>
        <p class="card-hint" data-i18n="excludeHint">Нажми на карточку — токен не будет использоваться</p>
        <div class="chips" id="chips"></div>
        <div class="chip-actions">
            <button data-action="exclude-all" type="button" data-i18n="excludeAll">Исключить все</button>
            <button data-action="include-all" type="button" data-i18n="includeAll">Включить все</button>
        </div>
    </div>

    <div class="card result-card" id="result-card">
        <p class="card-title" data-i18n="resultTitle">Результат</p>
        <div id="result">
            <p class="result-empty" data-i18n="resultEmpty">Нажми «Найти комбинацию»</p>
        </div>
    </div>
</div>

<div class="calc-bar">
    <button class="calc-btn" data-action="calculate" type="button" data-i18n="calcBtn">Найти комбинацию</button>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
